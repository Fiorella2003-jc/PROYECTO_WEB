<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Fiorella Jaramillo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/contactos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <h1 class="main-title">Ponte en <span class="highlight">Contacto</span></h1>
            <p class="subtitle">¿Tienes un proyecto en mente? ¡Hagámoslo realidad!</p>
        </div>
    </header>

    <main class="contact-container">
        <div class="contact-wrapper">
            
            <div class="contact-info">
                <h2>Información de Contacto</h2>
                <p>Si prefieres, puedes escribirme directamente por estos medios:</p>
                
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <a href="mailto:74501439@idexpasco.edu.pe">74501439@idexpasco.edu.pe</a>
                </div>
                
                <div class="info-item">
                    <i class="fas fa-phone-alt"></i>
                    <a href="tel:+51930828281">+51 930 828 281</a>
                </div>

                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Yanacancha, Pasco - Perú</span>
                </div>
            </div>

            <form class="contact-form">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="tu@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="asunto">Asunto</label>
                    <input type="text" id="asunto" placeholder="Motivo de consulta" required>
                </div>

                <div class="form-group">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
                </div>

                <button type="submit" class="btn-enviar">Enviar Mensaje</button>
            </form>
        </div>

        <div class="footer-actions">
            <a href="index.html" class="btn-regresar">Inicio</a>
        </div>
    </main>

    <a href="https://wa.me/51930828281?text=Hola%20Fiorella,%20vi%20tu%20web%20y%20me%20gustaría%20más%20información." class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

</body>
</html>
